<script src="/js/lib.js" defer></script> 
<script src="/js/hyphens_en-us.js" defer></script>
<script>
(function () {
  const libScript = document.createElement('script');
  libScript.src = '/js/lib.js';
  document.body.appendChild(libScript);
  
  const dictScript = document.createElement('script');
  dictScript.src = '/js/hyphens_en-us.js';
  document.body.appendChild(dictScript);

  const libLoaded = new Promise(resolve => libScript.onload = resolve);
  const dictLoaded = new Promise(resolve => dictScript.onload = resolve);

 Promise.all([libLoaded, dictLoaded]).then(() => {
    const lib = window.texLineBreak_lib;
    const dict = window["texLineBreak_hyphens_en-us"];
    const hyphenator = lib.createHyphenator(dict);

    function justifyAll() {
      const paras = Array.from(document.querySelectorAll('p'));
      lib.justifyContent(paras, hyphenator);
    }

    
    window.addEventListener('load', () => {
      justifyAll(); 

      
      if (window.innerWidth > 768) {
        let resizeTimeout;
        window.addEventListener('resize', () => {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(justifyAll, 150);
        });
      }
    });
  }).catch(err => console.error("TeX linebreak failed:", err));
})();
</script>










<link id="highlight-theme" rel="stylesheet" href="/css/highlight-light.css"> 


<button id="darkModeToggle" type="button" aria-pressed="false">🌓</button>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const key = 'darkMode';
  const stored = localStorage.getItem(key);
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = stored !== null ? stored === 'true' : prefersDark;

  document.body.classList.toggle('dark-mode', isDark);

  const btn = document.getElementById('darkModeToggle');
  if (btn) {
    btn.setAttribute('aria-pressed', String(isDark));
    btn.addEventListener('click', () => {
      const nowDark = !document.body.classList.contains('dark-mode');
      document.body.classList.toggle('dark-mode', nowDark);
      btn.setAttribute('aria-pressed', String(nowDark));
      localStorage.setItem(key, String(nowDark));
    });
  }
});
</script>
