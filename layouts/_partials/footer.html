<!-- GLightbox CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">

<!-- GLightbox JS -->
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    GLightbox({ selector: '.glightbox' });
  });
</script>


<script src="https://unpkg.com/tex-linebreak@0.8.1/dist/lib.js" defer></script>
<script src="https://unpkg.com/tex-linebreak@0.8.1/dist/hyphens_en-us.js" defer></script>
<script>
(function () {
  const libScript = document.createElement('script');
  libScript.src = 'https://unpkg.com/tex-linebreak@0.8.1/dist/lib.js';
  document.body.appendChild(libScript);

  const dictScript = document.createElement('script');
  dictScript.src = 'https://unpkg.com/tex-linebreak@0.8.1/dist/hyphens_en-us.js';
  document.body.appendChild(dictScript);

  const libLoaded = new Promise(resolve => libScript.onload = resolve);
  const dictLoaded = new Promise(resolve => dictScript.onload = resolve);

  Promise.all([libLoaded, dictLoaded]).then(() => {
    const lib = window.texLineBreak_lib;
    const dict = window["texLineBreak_hyphens_en-us"];
    const hyphenator = lib.createHyphenator(dict);

    function justifyAll() {
      const paras = Array.from(document.querySelectorAll('p'));
      lib.justifyContent(paras, hyphenator);
    }

    // Wait until entire page, images, and KaTeX are fully rendered
    window.addEventListener('load', () => {
      justifyAll(); // First full run

      // Optional: rejustify on desktop resize only
      if (window.innerWidth > 768) {
        let resizeTimeout;
        window.addEventListener('resize', () => {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(justifyAll, 150);
        });
      }
    });
  }).catch(err => console.error("TeX linebreak failed:", err));
})();
</script>





  </body>
</html>
